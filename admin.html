<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berci - Painel de Administração | Modo Edição</title>
    
    <link rel="shortcut icon" href="image/favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="assets/css/style.css?v=5">
    <style>
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(4px);
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .modal.open { 
            display: flex; 
        }
        .modal-content { 
            background: #ffffff; 
            padding: 2rem; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 600px; 
            max-height: 90vh; 
            overflow-y: auto; 
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .close-modal { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            background: #f1f5f9; 
            border: none; 
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }
        .close-modal:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; }
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .checkbox-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
        .checkbox-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>

    <<header style="display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: #ffffff; border-bottom: 1px solid #e2e8f0; height: 80px;">
        <div class="logo-area" style="flex: 1; display: flex; align-items: center;">
            <img src="image/Logo.png" alt="Berci Gráfica" style="height: 50px; width: auto; object-fit: contain;">
        </div>
        
        <div style="flex: 2; text-align: center;">
            <h1 class="titulo-pagina" style="font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; letter-spacing: -0.5px;">Modo Edição</h1>
        </div>
        
        <div style="flex: 1; display: flex; justify-content: flex-end;">
            <a href="index.html" class="btn-modo" style="text-decoration: none; color: #475569; font-weight: 600; font-size: 0.9rem; padding: 0.6rem 1.2rem; border-radius: 6px; background: #f1f5f9; transition: background 0.2s;">Sair do Modo Edição →</a>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="menu-admin">
            <button class="btn btn-primary" onclick="abrirModalCategoria()" style="width: 100%; margin-bottom: 1.5rem; display: block;">
                + Nova Categoria
            </button>
        </aside>

        <main class="conteudo">
            <div id="grid-produtos-admin" class="produtos-grid">
                <p class="mensagem-inicial">Selecione uma subcategoria no menu lateral para visualizar e gerir os produtos.</p>
            </div>
        </main>
    </div>

    <div id="modal-categoria" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="fecharModais()">✕</button>
            <h2 id="modal-cat-titulo" style="margin-bottom: 1.5rem; font-size: 1.3rem;">Nova Categoria</h2>
            <form id="form-categoria" onsubmit="guardarCategoria(event)">
                <input type="hidden" id="cat-id">
                <div class="form-group">
                    <label>Nome da Categoria</label>
                    <input type="text" id="cat-nome" class="form-control" required placeholder="Ex: Cartões de Visita">
                </div>
                <button type="submit" class="btn btn-primary">Guardar Categoria</button>
            </form>
        </div>
    </div>

    <div id="modal-subcategoria" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="fecharModais()">✕</button>
            <h2 id="modal-subcat-titulo" style="margin-bottom: 1.5rem; font-size: 1.3rem;">Nova Subcategoria</h2>
            <form id="form-subcategoria" onsubmit="guardarSubcategoria(event)">
                <input type="hidden" id="subcat-id">
                <input type="hidden" id="subcat-cat-id">
                <div class="form-group">
                    <label>Nome da Subcategoria</label>
                    <input type="text" id="subcat-nome" class="form-control" required placeholder="Ex: Premium">
                </div>
                <button type="submit" class="btn btn-primary">Guardar Subcategoria</button>
            </form>
        </div>
    </div>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="fecharModais()">✕</button>
            <h2 id="modal-prod-titulo" style="margin-bottom: 1.5rem; font-size: 1.3rem;">Novo Produto</h2>
            <form id="form-produto" onsubmit="guardarProduto(event)">
                <input type="hidden" id="prod-id">
                <input type="hidden" id="prod-subcat-id">
                <input type="hidden" id="prod-img-atual">

                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="prod-nome" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Imagem do Produto</label>
                    <input type="file" id="prod-imagem" class="form-control" accept="image/*">
                </div>

                <div class="form-group checkbox-item">
                    <input type="checkbox" id="prod-tipo-preco" onchange="toggleTipoPreco()">
                    <label for="prod-tipo-preco" style="margin-bottom:0; cursor:pointer;">Este produto tem preço variável / dinâmico</label>
                </div>

                <div id="bloco-preco-fixo" class="form-group">
                    <label>Preço Fixo (€)</label>
                    <input type="number" id="prod-preco-fixo" class="form-control" step="0.01" value="0.00">
                </div>

                <div id="bloco-preco-variavel" style="display: none; background: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px dashed #cbd5e1; margin-bottom: 1.2rem;">
                    <label style="font-weight: 700;">Selecione os Fatores Multiplicadores:</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item"><input type="checkbox" class="chk-fator" value="dimensao" onchange="gerarMatriz()"> Dimensão</div>
                        <div class="checkbox-item"><input type="checkbox" class="chk-fator" value="quantidade" onchange="gerarMatriz()"> Quantidade</div>
                        <div class="checkbox-item"><input type="checkbox" class="chk-fator" value="papel" onchange="gerarMatriz()"> Tipo de Papel</div>
                        <div class="checkbox-item"><input type="checkbox" class="chk-fator" value="acabamento" onchange="gerarMatriz()"> Acabamento</div>
                        <div class="checkbox-item"><input type="checkbox" class="chk-fator" value="cantos_arredondados" onchange="gerarMatriz()"> Cantos Arredondados</div>
                        <div class="checkbox-item"><input type="checkbox" id="chk-mala" class="chk-fator" value="mala" onchange="gerarMatriz()"> Tipo de Mala</div>
                    </div>

                    <div class="checkbox-group" id="item-chk-acessorios-mala" style="display:none; margin-top: 0.5rem; padding-left: 1rem;">
                        <div class="checkbox-item"><input type="checkbox" id="chk-acessorios-mala" class="chk-fator" value="acessorios_mala" onchange="gerarMatriz()"> Incluir Acessórios da Mala</div>
                    </div>

                    <div id="inputs-valores-fatores" style="margin-top: 1.2rem; display: flex; flex-direction: column; gap: 0.8rem;"></div>
                    
                    <div id="seccao-tabela-matriz" style="margin-top: 1.5rem; display: none;">
                        <label style="font-weight:700; margin-bottom:0.5rem; display:block;">Matriz Combinatória de Preços</label>
                        <div id="container-tabela-matriz" style="overflow-x:auto; background:white; border:1px solid #e2e8f0; border-radius:6px;"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Guardar Produto</button>
            </form>
        </div>
    </div>

    <script src="assets/js/admin.js"></script>
</body>
</html>
